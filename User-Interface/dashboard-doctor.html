<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta name="author" content="Group 30 - Caelan Millen and Chloe Pham">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is the app landing page displaying wallet address and role selection.">
    <title> Landing Page | Block Care </title>
</head>
<body>

<div class="page">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h1>Welcome!</h1>

        <div class="logo-box">
            <div class="block">BLOCK</div>
            <div class="care">CARE</div>
        </div>

        <p class="subtitle">
            Blockchain Healthcare Application
        </p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <button class="btn connect">Connect Wallet</button>

        <button class="btn select">Select Role</button>

        <div class="roles">

            <div class="role">
                <div class="icon">👨‍⚕️</div>
                <p>Patient</p>
            </div>

            <div class="role">
                <div class="icon">🩺</div>
                <p>Medical Specialist</p>
            </div>

            <div class="role">
                <div class="icon">👨‍👩‍👧</div>
                <p>Trusted User</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
