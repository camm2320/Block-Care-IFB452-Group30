<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BlockCare - Blockchain Healthcare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h1>Welcome!</h1>

        <div class="logo-box">
            <div class="block">BLOCK</div>
            <div class="care">CARE</div>
        </div>

        <p class="subtitle">
            Blockchain Healthcare Application
        </p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <button class="btn connect">Connect Wallet</button>

        <button class="btn select">Select Role</button>

        <div class="roles">

            <div class="role">
                <div class="icon">👨‍⚕️</div>
                <p>Patient</p>
            </div>

            <div class="role">
                <div class="icon">🩺</div>
                <p>Medical Specialist</p>
            </div>

            <div class="role">
                <div class="icon">👨‍👩‍👧</div>
                <p>Trusted User</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
