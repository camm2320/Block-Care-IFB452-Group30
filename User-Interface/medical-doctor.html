<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta name="author" content="Group 30 - Caelan Millen and Chloe Pham">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Medical Page - Patient | Block Care </title>
</head>


<body class="medical-page">
     <header class="header">
    
        <div class="logo-section">
            <img src="Images/logo.png" class="logo" alt="BlockCare Logo">
            <div>
                <h3>BLOCK CARE</h3>
                <p class="subtext">Blockchain Healthcare Application</p>
            </div>
        </div>

        <div class="welcome-section">
            <h2>Welcome back Jimmy!</h2>
            <p>Wallet Address: <span id="wallet">0x1234567</span></p>
        </div>

        <div class="user-section">
            <img src="Images/doctor.png" class="avatar" alt="User">
            <button class="logout" onclick="window.location.href='landing-page.html'">
  Log out
</button>
        </div>

    </header>

    <hr>



<h1> Medical Patient Dashboard </h1>

<section class="access-box">

    <h3>Add Patient Medical Record</h3>
    <hr>

    <label>Patient Wallet Address:</label>
    <input
        type="text"
        id="recordPatientAddress"
        placeholder="0x..."
    >

    <label>Diagnosis / Treatment Notes:</label>
    <input
        type="text"
        id="diagnosisInput"
        placeholder="Enter diagnosis or treatment notes"
    >

    <div class="buttons">
        <button
            id="addRecordButton"
            class="grant"
        >
            Add Medical Record
        </button>
    </div>

</section>

</footer>
